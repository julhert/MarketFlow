version: '3.8'

services:
    backend:
        build: 
            context: ./backend
            dockerfile: Dockerfile
        container_name: marketflow_backend
        restart: unless-stopped
        ports:
            - "8000:80"
        volumes:
            - ./backend:/var/www/html
        depends_on:
            - db
        networks:
            - marketflow_network
    frontend:
        build:
            context: ./frontend
            dockerfile: Dockerfile
        container_name: marketflow_frontend
        restart: unless-stopped
        ports:
            - "8080:80"
        volumes:
            - ./frontend:/var/www/html
        networks:
            - marketflow_network
    db:
        image: mysql:latest
        container_name: marketflow_container_db
        restart: unless-stopped
        ports:
            - "3307:3306"
        environment:
            MYSQL_DATABASE: marketflow_db
            MYSQL_USER: marketflow_user
            MYSQL_PASSWORD: secret
            MYSQL_ROOT_PASSWORD: secret
        volumes:
            - db_data:/var/lib/mysql
        networks:
            - marketflow_network

volumes:
    db_data:
networks:
    marketflow_network:
        driver: bridge